<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riedho & Rizki</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SLIDE 1 COVER -->
<section class="slide cover">
  <div class="overlay">
    <p class="kepada">Kepada Yth.</p>
    <h2 id="guestName">Tamu Undangan</h2>
    <button onclick="openInvitation()">Buka Undangan</button>
  </div>
</section>

<!-- SLIDE 2 VIDEO -->
<section class="slide video-slide">
  <video autoplay muted loop playsinline>
    <source src="assets/video.mp4" type="video/mp4">
  </video>
</section>

<!-- SLIDE 3 DOA -->
<section class="slide doa">
  <div class="content">
    <p class="arab">
      وَمِنْ كُلِّ شَيْءٍ خَلَقْنَا زَوْجَيْنِ لَعَلَّكُمْ تَذَكَّرُونَ
    </p>
    <p class="arti">
      "Dan segala sesuatu Kami ciptakan berpasang-pasangan agar kamu mengingat kebesaran Allah."
    </p>
  </div>
</section>

<!-- SLIDE 4 FOTO -->
<section class="photo-section" id="photoSection">
  <div class="photo-container">
    <div class="photo-frame">
      <img src="assets/photo-1.jpg" alt="Foto Kami" id="weddingPhoto">
    </div>
  </div>
</section>

<!-- SLIDE 5 LOKASI -->
<section class="location-slide">

  <div class="location-design">
    <p class="akses-text">Klik untuk mengakses lokasi</p>
    <a 
      href="https://maps.app.goo.gl/6ZvCWmtx51vHBCDK8" 
      target="_blank"
      class="map-access-button">
    </a>

  </div>

</section>

<!-- SLIDE 6 RSVP -->
<section class="slide rsvp">
  <h2>Konfirmasi Kehadiran</h2>

  <form id="rsvpForm">
    <input type="text" name="nama" placeholder="Nama Lengkap" required>

    <select name="kehadiran" required>
      <option value="">Pilih Kehadiran</option>
      <option value="Hadir">Hadir</option>
      <option value="Tidak Hadir">Tidak Hadir</option>
    </select>

    <textarea name="ucapan" placeholder="Ucapan & Doa"></textarea>

    <button type="submit">Kirim</button>
  </form>
</section>

<!-- SLIDE 7 WEDDING GIFT -->
<section class="slide gift">
  <h2>Wedding Gift</h2>

  <div class="card">
    <h3>Bank BCA</h3>
    <p id="rek1">1234567890</p>
    <button onclick="copyRek('rek1')">Salin No. Rekening</button>
  </div>

  <div class="card">
    <h3>Bank Mandiri</h3>
    <p id="rek2">0987654321</p>
    <button onclick="copyRek('rek2')">Salin No. Rekening</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
